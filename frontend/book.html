<!DOCTYPE html>
<html>

<head>

<title>BookHub - Book Details</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
font-family:Poppins;
background:#f4f6f9;
}

.container{
display:flex;
gap:40px;
padding:40px;
}

img{
width:260px;
border-radius:8px;
}

.book-info{
max-width:600px;
}

.price{
color:#b12704;
font-size:22px;
font-weight:bold;
}

button{
background:#ff9900;
border:none;
padding:12px 18px;
margin-top:15px;
cursor:pointer;
}

.similar{
padding:40px;
}

.book-grid{
display:grid;
grid-template-columns:repeat(auto-fill,180px);
gap:20px;
}

.book-card{
background:white;
padding:10px;
border-radius:6px;
box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

.book-card img{
width:100%;
height:220px;
object-fit:cover;
}

</style>

</head>

<body>

<h1 style="text-align:center;">📚 BookHub</h1>

<div id="bookContainer"></div>

<div class="similar">

<h2>Similar Books</h2>

<div id="similarBooks" class="book-grid"></div>

</div>

<script>

function getParam(name){
const params=new URLSearchParams(window.location.search);
return params.get(name);
}


async function getBookData(title){

let url="https://www.googleapis.com/books/v1/volumes?q=intitle:"+title;

let res=await fetch(url);
let data=await res.json();

return data.items[0].volumeInfo;

}


async function loadBook(){

let id=getParam("id");

let res=await fetch("http://127.0.0.1:5000/book/"+id);
let book=await res.json();

let google=await getBookData(book.title);

let image=google.imageLinks.thumbnail;
let summary=google.description || "No description available";
let rating=google.averageRating || "N/A";
let pages=google.pageCount || "Unknown";

let html=`

<div class="container">

<img src="${image}">

<div class="book-info">

<h2>${book.title}</h2>

<p><b>Author:</b> ${book.author}</p>

<p class="price">₹${book.price}</p>

<p><b>Rating:</b> ⭐ ${rating}</p>

<p><b>Pages:</b> ${pages}</p>

<p><b>Seller Email:</b> ${book.seller_email}</p>

<p><b>Seller Phone:</b> ${book.seller_phone}</p>

<h3>Summary</h3>

<p>${summary}</p>

<button onclick="contactSeller('${book.seller_phone}')">
Contact Seller
</button>

</div>

</div>

`;

document.getElementById("bookContainer").innerHTML=html;

loadSimilar(book.title);

}


function contactSeller(phone){

alert("Contact seller at: "+phone);

}


async function loadSimilar(title){

let url="https://www.googleapis.com/books/v1/volumes?q="+title;

let res=await fetch(url);
let data=await res.json();

let html="";

data.items.slice(1,6).forEach(b=>{

let img=b.volumeInfo.imageLinks?.thumbnail;

let name=b.volumeInfo.title;

html+=`

<div class="book-card">

<img src="${img}">

<p>${name}</p>

</div>

`;

});

document.getElementById("similarBooks").innerHTML=html;

}

window.onload=loadBook;

</script>

</body>

</html>
