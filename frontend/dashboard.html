<!DOCTYPE html>
<html>

<head>

<title>BookHub Seller Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#f4f6f9;
}

/* HEADER */

.dashboard-header{
background:#131921;
color:white;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.dashboard-header a{
color:white;
text-decoration:none;
font-size:14px;
}

/* MAIN */

.dashboard-container{
padding:40px;
}

.controls{
margin-bottom:30px;
}

.controls input{
padding:10px;
width:260px;
margin-right:10px;
border-radius:4px;
border:1px solid #ccc;
}

.controls button{
padding:10px 16px;
background:#ff9900;
border:none;
cursor:pointer;
border-radius:4px;
}

/* BOOK GRID */

.book-grid{
display:grid;
grid-template-columns:repeat(auto-fill,220px);
gap:25px;
}

/* BOOK CARD */

.book-card{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

.book-card img{
width:100%;
height:250px;
object-fit:cover;
border-radius:6px;
}

.book-card h3{
margin:10px 0;
font-size:16px;
}

.price{
color:#b12704;
font-weight:bold;
}

/* BUTTONS */

.book-actions{
margin-top:10px;
display:flex;
justify-content:space-between;
}

.book-actions button{
padding:6px 10px;
border:none;
cursor:pointer;
border-radius:4px;
}

.update{
background:#0073e6;
color:white;
}

.delete{
background:#d32f2f;
color:white;
}

</style>

</head>

<body>

<header class="dashboard-header">

<h2>📚 BookHub Seller Dashboard</h2>

<a href="index.html">Home</a>

</header>


<div class="dashboard-container">

<div class="controls">

<input id="sellerEmail" placeholder="Enter your seller email">

<button onclick="loadBooks()">Load My Books</button>

</div>

<div id="books" class="book-grid"></div>

</div>


<script>

async function getBookImage(title){

let url="https://www.googleapis.com/books/v1/volumes?q=intitle:"+title;

let res=await fetch(url);
let data=await res.json();

if(data.items && data.items.length>0){

if(data.items[0].volumeInfo.imageLinks){
return data.items[0].volumeInfo.imageLinks.thumbnail;
}

}

return "https://via.placeholder.com/200x250?text=Book";

}


async function loadBooks(){

let email=document.getElementById("sellerEmail").value;

let res=await fetch("http://127.0.0.1:5000/seller/books/"+email);

let books=await res.json();

let html="";

for(const book of books){

let img=await getBookImage(book.title);

html+=`

<div class="book-card">

<img src="${img}">

<h3>${book.title}</h3>

<p>${book.author}</p>

<p class="price">₹${book.price}</p>

<div class="book-actions">

<button class="update" onclick="updatePrice(${book.id})">
Update
</button>

<button class="delete" onclick="deleteBook(${book.id})">
Delete
</button>

</div>

</div>

`;

}

document.getElementById("books").innerHTML=html;

}


function updatePrice(id){

let price=prompt("Enter new price");

fetch("http://127.0.0.1:5000/book/"+id,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
price:price
})

})

.then(res=>res.json())
.then(data=>{

alert(data.message);
loadBooks();

});

}


function deleteBook(id){

if(!confirm("Delete this book?")) return;

fetch("http://127.0.0.1:5000/book/"+id,{
method:"DELETE"
})

.then(res=>res.json())
.then(data=>{

alert(data.message);
loadBooks();

});

}

</script>

</body>

</html>
